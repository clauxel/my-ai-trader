name = "my-ai-trader"
main = "worker/index.js"
compatibility_date = "2026-05-09"
workers_dev = true
routes = [
  { pattern = "ai-trader.best/*", zone_name = "ai-trader.best" },
  { pattern = "www.ai-trader.best/*", zone_name = "ai-trader.best" }
]

[vars]
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[assets]
directory = "./dist"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/",
  "/ai-trader-app",
  "/ai-trader-bot",
  "/ai-trader-github",
  "/ai-trader-review",
  "/ai-trader-competition",
  "/ai-trader-prediction",
  "/ai-trader-free",
  "/ai-trader-chatgpt",
  "/pricing",
  "/privacy",
  "/terms",
  "/sitemap.xml",
  "/robots.txt",
  "/api/*"
]
